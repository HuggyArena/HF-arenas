# Local integration docker-compose
# Run from the monorepo root:
#   docker compose up --build
#
# All build contexts are set to `.` (monorepo root) so that workspace
# packages (e.g. @arena/shared-prisma) are available during image builds.

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/arena
    command: >
      sh -c "npm install -g pnpm@9.12.3 &&
             pnpm --dir prisma run migrate:deploy"
    depends_on:
      db:
        condition: service_healthy

  relayer:
    build:
      context: .
      dockerfile: apps/relayer/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/arena
      REDIS_URL: redis://redis:6379
      CHAIN_ID: ${CHAIN_ID:-137}
      RPC_URL: ${RPC_URL}
      USDC_ADDRESS: ${USDC_ADDRESS}
      REGISTRY_ADDRESS: ${REGISTRY_ADDRESS:-0x0000000000000000000000000000000000000000}
      ORACLE_PRIVATE_KEY: ${ORACLE_PRIVATE_KEY}
      GELATO_API_KEY: ${GELATO_API_KEY}
      SANCTIONS_PROVIDER: ${SANCTIONS_PROVIDER:-TRM}
      TRM_API_KEY: ${TRM_API_KEY:-}
      CHAINALYSIS_API_KEY: ${CHAINALYSIS_API_KEY:-}
      SUMSUB_APP_TOKEN: ${SUMSUB_APP_TOKEN:-}
      SUMSUB_SECRET_KEY: ${SUMSUB_SECRET_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  indexer:
    build:
      context: .
      dockerfile: apps/indexer/Dockerfile
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@db:5432/arena
      SUBGRAPH_URL: ${SUBGRAPH_URL}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  postgres_data:
