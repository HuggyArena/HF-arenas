name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Default to minimal read-only permissions; individual jobs override as needed.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "9.12.3"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Lint & type-check every push
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

  # ──────────────────────────────────────────────────────────────────────────
  # Build all workspace packages + apps
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Build all packages
        run: pnpm build

      - name: Build subgraph
        run: pnpm subgraph:build

  # ──────────────────────────────────────────────────────────────────────────
  # Run tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Run tests
        run: pnpm test

  # ──────────────────────────────────────────────────────────────────────────
  # Build Docker images (only on main)
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build relayer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/relayer/Dockerfile
          push: false
          tags: arena-relayer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build indexer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/indexer/Dockerfile
          push: false
          tags: arena-indexer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Manual approval gate before deploy to production
  # ──────────────────────────────────────────────────────────────────────────
  approve-deploy:
    name: Approve deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    permissions: {}
    environment:
      name: production
    steps:
      - name: Approved
        run: echo "Deploy approved — proceeding."

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy relayer to production
  # ──────────────────────────────────────────────────────────────────────────
  deploy-relayer:
    name: Deploy relayer
    runs-on: ubuntu-latest
    needs: approve-deploy
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Push relayer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/relayer/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/arena-relayer:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/arena-relayer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Add your deployment step here (e.g. kubectl rollout, Railway deploy,
      # Fly deploy, AWS ECS task update, etc.)
      - name: Deploy relayer
        run: |
          echo "Deploy arena-relayer:${{ github.sha }} to production"
          # TODO: replace with actual deploy command, for example:
          # fly deploy --app arena-relayer --image ${{ secrets.REGISTRY_URL }}/arena-relayer:${{ github.sha }}

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy indexer to production
  # ──────────────────────────────────────────────────────────────────────────
  deploy-indexer:
    name: Deploy indexer
    runs-on: ubuntu-latest
    needs: approve-deploy
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Push indexer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/indexer/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/arena-indexer:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/arena-indexer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy indexer
        run: |
          echo "Deploy arena-indexer:${{ github.sha }} to production"
          # TODO: replace with actual deploy command
